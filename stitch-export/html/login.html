<script>
        // Minimal interaction logic for tab switching demonstration
        document.addEventListener('DOMContentLoaded', () => {
            const loginTab = document.getElementById('tab-login');
            const signupTab = document.getElementById('tab-signup');
            const submitBtn = document.querySelector('button[type="submit"]');

            if(loginTab && signupTab && submitBtn) {
                signupTab.addEventListener('click', () => {
                    // Visual switch to Sign Up
                    signupTab.classList.replace('text-surface-variant', 'text-pure-white');
                    signupTab.classList.add('border-b-2', 'border-primary');
                    
                    loginTab.classList.replace('text-pure-white', 'text-surface-variant');
                    loginTab.classList.remove('border-b-2', 'border-primary');
                    
                    submitBtn.textContent = 'CREATE ACCOUNT';
                });

                loginTab.addEventListener('click', () => {
                    // Visual switch to Login
                    loginTab.classList.replace('text-surface-variant', 'text-pure-white');
                    loginTab.classList.add('border-b-2', 'border-primary');
                    
                    signupTab.classList.replace('text-pure-white', 'text-surface-variant');
                    signupTab.classList.remove('border-b-2', 'border-primary');
                    
                    submitBtn.textContent = 'SIGN IN';
                });
            }
        });
    </script>
